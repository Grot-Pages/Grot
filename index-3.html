<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Purikill 이벤트 종료 안내</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #1A1A1A;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .notice {
      width: 860px;
      height: 1080px;
      background: #1A1A1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* ── 경고 아이콘 ── */
    .warning-icon {
      margin-bottom: 36px;
    }

    .warning-icon img {
      width: 120px;
      height: auto;
    }

    /* ── 안내 문구 ── */
    .notice-text {
      font-size: 28px;
      font-weight: 300;
      color: #cccccc;
      line-height: 1.7;
      margin-bottom: 50px;
    }

    .notice-text .bold {
      font-weight: 700;
      color: #ffffff;
    }

    /* ── 세로 구분선 ── */
    .divider {
      width: 2px;
      height: 80px;
      background: #555555;
      margin: 0 auto 50px auto;
    }

    /* ── 위 혜택은 ── */
    .benefit-label {
      font-size: 28px;
      font-weight: 300;
      color: #cccccc;
      margin-bottom: 20px;
    }

    /* ── 빨간 박스 (날짜 + 시간) ── */
    .deadline-box {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E81919;
      width: 580px;
      height: 130px;
      border-radius: 8px;
      margin: 0 auto 24px auto;
    }

    .deadline-text {
      font-size: 50px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    /* ── 깜빡이는 효과 (1초 깜빡임 + 5초 유지) ── */
    @keyframes blink {
      0%    { opacity: 1; }
      8%    { opacity: 0; }
      17%   { opacity: 1; }
      100%  { opacity: 1; }
    }

    .blink {
      animation: blink 6s ease-in-out infinite;
    }

    /* ── 모두 종료됩니다 ── */
    .ending-text {
      font-size: 48px;
      font-weight: 700;
      color: #E81919;
      letter-spacing: -1px;
    }
  </style>
</head>
<body>
  <div class="notice">

    <!-- 경고 아이콘 -->
    <div class="warning-icon">
      <img src="warnig.JPG" alt="경고" />
    </div>

    <!-- 안내 문구 -->
    <p class="notice-text">
      기간 한정으로 진행하는 이벤트로<br/>
      종료 후 다시 <span class="bold">정상가 판매, 무료 체험 중단</span> 되는 점<br/>
      양해 부탁드립니다.
    </p>

    <!-- 세로 구분선 -->
    <div class="divider"></div>

    <!-- 위 혜택은 -->
    <p class="benefit-label">위 혜택은</p>

    <!-- 빨간 박스 (오늘 날짜 + 23시 59분) -->
    <div class="deadline-box">
      <span class="deadline-text blink" id="deadlineText">계산 중...</span>
    </div>

    <!-- 모두 종료됩니다 -->
    <p class="ending-text">모두 종료됩니다.</p>

  </div>

  <script>
    (function () {
      var today = new Date();
      var m = today.getMonth() + 1;
      var d = today.getDate();

      document.getElementById('deadlineText').textContent =
        m + '월 ' + d + '일 23시 59분';
    })();
  </script>
</body>
</html>
