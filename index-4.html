<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>긴급공지</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #ffffff;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .notice {
      width: 400px;
      background: #ffffff;
      text-align: center;
      padding: 40px 60px;
      font-size: 11px;
      color: #000000;
      line-height: 18px;
    }

    .red {
      color: #ff0000;
    }

    .bold {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="notice">
    <p>&lt;<span id="todayDate">4월 17일</span> 긴급공지&gt;</p>
    <p class="red bold">죄송합니다.</p>
    <p>최근 미세먼지 악화와</p>
    <p>산후조리원, 어린이집 대량 발주로인해</p>
    <p>재고 수량이 9개 미만입니다.</p>
    <br/>
    <p>좀 더 많은 분들이 이용하실 수 있게</p>
    <p>인당 최대 3개까지만 구매가 제한됩니다.</p>
    <br/>
    <p>품절이 될지연정</p>
    <p>빠르게 생산하지 못하더라도</p>
    <p>완벽하게 만들겠습니다.</p>
    <p>품절이 되더라도 너그러운 양해 부탁드립니다.</p>
  </div>

  <script>
    (function () {
      var today = new Date();
      var m = today.getMonth() + 1;
      var d = today.getDate();
      document.getElementById('todayDate').textContent = m + '월 ' + d + '일';
    })();
  </script>
</body>
</html>
